<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Rated ENTERTAINER Restaurants in Abu Dhabi</title>
  <meta name="description" content="Top rated restaurants accepting ENTERTAINER, grouped by Abu Dhabi area with Google ratings, review counts, and distance from Reem Island.">
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #202124;
      --muted: #5f6368;
      --line: #dfe5ec;
      --soft: #eef4fb;
      --blue: #1a73e8;
      --blue-dark: #174ea6;
      --green: #1e8e3e;
      --yellow: #fbbc04;
      --red: #d93025;
      --ink-soft: #3c4043;
      --shadow: 0 5px 18px rgba(60, 64, 67, 0.12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body { overflow-x: hidden; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      max-width: 1440px;
      margin: 0 auto;
      padding: 14px 18px;
    }

    .search-wrap {
      min-width: 0;
      position: relative;
    }

    .search-wrap::before {
      content: "";
      position: absolute;
      left: 17px;
      top: 50%;
      width: 15px;
      height: 15px;
      border: 2px solid #6f7479;
      border-radius: 50%;
      transform: translateY(-56%);
    }

    .search-wrap::after {
      content: "";
      position: absolute;
      left: 29px;
      top: 29px;
      width: 7px;
      height: 2px;
      border-radius: 2px;
      background: #6f7479;
      transform: rotate(45deg);
    }

    #search {
      width: 100%;
      height: 46px;
      border: 1px solid #dadce0;
      border-radius: 23px;
      padding: 0 16px 0 46px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      box-shadow: 0 1px 2px rgba(60,64,67,0.13);
      outline: none;
    }

    #search:focus {
      border-color: var(--blue);
      box-shadow: 0 1px 3px rgba(26,115,232,0.24), 0 0 0 3px rgba(26,115,232,0.10);
    }

    select, .clear-btn {
      height: 42px;
      border: 1px solid #dadce0;
      border-radius: 21px;
      background: #fff;
      color: var(--ink-soft);
      font-size: 13px;
    }

    select {
      min-width: 168px;
      padding: 0 34px 0 13px;
    }

    .clear-btn {
      min-width: 42px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
    }

    .clear-btn:hover, .clear-btn:focus-visible, select:focus-visible {
      border-color: #a8c7fa;
      outline: none;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.10);
    }

    .shell {
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .side {
      position: sticky;
      top: 88px;
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .summary {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    .summary-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-width: 0;
      background: #fbfcfe;
      border: 1px solid #e5eaf0;
      border-radius: var(--radius);
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.08;
      color: var(--text);
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .area-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .area-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid #edf0f2;
    }

    .area-panel-head h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .result-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .area-list {
      max-height: calc(100vh - 330px);
      overflow: auto;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .area-btn {
      width: 100%;
      border: 1px solid transparent;
      background: #fff;
      border-radius: var(--radius);
      padding: 10px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .area-btn:hover, .area-btn:focus-visible {
      background: #f8fbff;
      border-color: #d2e3fc;
      outline: none;
    }

    .area-btn.active {
      background: #eaf2ff;
      border-color: #a8c7fa;
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .area-name {
      min-width: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .area-meta {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .area-count {
      border-radius: 12px;
      background: #f1f3f4;
      color: var(--ink-soft);
      min-height: 24px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .content {
      min-width: 0;
      display: grid;
      gap: 14px;
    }

    .area-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .area-chip {
      flex: 0 0 auto;
      border: 1px solid #dadce0;
      border-radius: 18px;
      background: #fff;
      color: var(--ink-soft);
      min-height: 36px;
      padding: 7px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      box-shadow: 0 1px 2px rgba(60,64,67,0.08);
    }

    .area-chip:hover, .area-chip:focus-visible, .area-chip.active {
      border-color: #a8c7fa;
      background: #eaf2ff;
      color: var(--blue-dark);
      outline: none;
    }

    .distance-dot {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      min-height: 22px;
      border-radius: 11px;
      background: #f1f3f4;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 6px;
    }

    .area-chip.active .distance-dot {
      background: #fff;
      color: var(--blue-dark);
    }

    .sections {
      display: grid;
      gap: 14px;
    }

    .area-section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      border-bottom: 1px solid #edf0f2;
      background: linear-gradient(180deg, #ffffff, #fbfdff);
    }

    .section-title {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .section-distance {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .pin-mark {
      width: 17px;
      height: 17px;
      border-radius: 50% 50% 50% 3px;
      background: var(--red);
      transform: rotate(-45deg);
      display: inline-block;
      position: relative;
      flex: 0 0 auto;
    }

    .pin-mark::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    .section-metrics {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .metric {
      min-height: 30px;
      border-radius: 15px;
      background: #f1f3f4;
      color: var(--ink-soft);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .star { color: #f29900; font-weight: 700; }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .restaurant-card {
      min-width: 0;
      border: 1px solid #e6eaef;
      border-radius: var(--radius);
      background: #fff;
      padding: 13px;
      display: grid;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .restaurant-card:hover, .restaurant-card:focus-visible {
      border-color: #a8c7fa;
      box-shadow: 0 4px 14px rgba(26,115,232,0.12);
      outline: none;
    }

    .card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .name {
      margin: 0;
      font-size: 15px;
      line-height: 1.28;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .score {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--ink-soft);
      font-size: 13px;
      white-space: nowrap;
    }

    .location, .address, .small-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .location { color: var(--ink-soft); }

    .card-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 23px;
      padding: 4px 8px;
      border-radius: 12px;
      background: #f1f3f4;
      color: var(--ink-soft);
      font-size: 11px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge.distance {
      background: #e8f0fe;
      color: var(--blue-dark);
      font-weight: 700;
    }

    .empty {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow);
    }

    @media (max-width: 1020px) {
      .toolbar { grid-template-columns: minmax(0, 1fr) auto; }
      .clear-btn { grid-column: 2; grid-row: 1; }
      #cuisineFilter { grid-column: 1; width: 100%; }
      #sortBy { grid-column: 2; width: 100%; min-width: 0; }
      .shell { grid-template-columns: 1fr; }
      .side { position: static; }
      .area-list {
        max-height: none;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      }
    }

    @media (max-width: 620px) {
      .toolbar {
        grid-template-columns: minmax(0, 1fr) 42px;
        gap: 8px;
        padding: 10px;
      }
      .clear-btn { min-width: 42px; padding: 0; }
      #cuisineFilter, #sortBy { grid-column: 1 / -1; min-width: 0; }
      .shell { padding: 10px; gap: 10px; }
      .summary { padding: 13px; }
      h1 { font-size: 19px; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .section-head { grid-template-columns: 1fr; padding: 13px; }
      .section-metrics { justify-content: flex-start; }
      .restaurant-grid { grid-template-columns: 1fr; padding: 10px; }
      .area-list { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <section class="content" aria-label="Restaurant results">

        <div class="sections" id="sections"></div>
      </section>
    </div>
  </main>

  <script type="application/json" id="stats-data">{"count":106,"areaCount":19,"avgRating":4.69,"totalReviews":18672,"reemAnchor":{"lat":24.492192,"lng":54.404471}}</script>
  <script>
    const restaurants = JSON.parse(document.getElementById('restaurant-data').textContent);
    const areas = JSON.parse(document.getElementById('area-data').textContent);
    const stats = JSON.parse(document.getElementById('stats-data').textContent);
    const state = { query: '', area: 'all', cuisine: 'all', sortBy: 'area' };
    const els = {
      search: document.getElementById('search'),
      clearSearch: document.getElementById('clearSearch'),
      cuisineFilter: document.getElementById('cuisineFilter'),
      sortBy: document.getElementById('sortBy'),
      areaList: document.getElementById('areaList'),
      areaStrip: document.getElementById('areaStrip'),
      sections: document.getElementById('sections'),
      empty: document.getElementById('emptyState'),
      resultCount: document.getElementById('resultCount')
    };
    const areaByName = new Map(areas.map(area => [area.name, area]));
    const areaOrder = new Map(areas.map((area, index) => [area.name, index]));
    const cuisineNoise = new Set(['Casual', 'Premium', 'Breakfast', 'Brunch', 'Buffet', 'Set Menu', 'BOGO', 'Informal', 'Light Bites']);
    const cuisineAliases = new Map([
      ['BBQ/Grill', 'BBQ / Grill'],
      ['Hotdog', 'Hot Dog'],
      ['Indian restaurant', 'Indian']
    ]);

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function formatReviews(value) {
      return Number(value || 0).toLocaleString('en-US');
    }

    function formatDistance(value) {
      if (value === null || value === undefined) return 'Distance n/a';
      if (Number(value) === 0) return '0 km from Reem';
      return `${Number(value).toFixed(1)} km from Reem`;
    }

    function visibleDistance(value) {
      if (value === null || value === undefined) return 'n/a';
      return Number(value) === 0 ? '0 km' : `${Number(value).toFixed(1)} km`;
    }

    function normalizeCuisine(value) {
      const trimmed = String(value || '').trim();
      if (!trimmed || cuisineNoise.has(trimmed)) return '';
      if (cuisineAliases.has(trimmed)) return cuisineAliases.get(trimmed);
      return trimmed.replace(/\s+restaurant$/i, '').replace(/\s+cafe$/i, '').replace(/\s+shop$/i, '').trim();
    }

    function categoryCuisine(category) {
      const text = String(category || '').toLowerCase();
      const matches = [
        ['Indian', 'indian'], ['Italian', 'italian'], ['Chinese', 'chinese'], ['Japanese', 'japanese'],
        ['Thai', 'thai'], ['Mexican', 'mexican'], ['Lebanese', 'lebanese'], ['Mediterranean', 'mediterranean'],
        ['American', 'american'], ['French', 'french'], ['Korean', 'korean'], ['Turkish', 'turkish'],
        ['Greek', 'greek'], ['Barbecue', 'barbecue'], ['Pizza', 'pizza'], ['Burger', 'burger'],
        ['Coffee', 'coffee'], ['Dessert', 'dessert'], ['Ice Cream', 'ice cream'], ['Cafe', 'cafe'],
        ['Chicken', 'chicken'], ['Middle Eastern', 'middle eastern']
      ];
      return matches.find(([, token]) => text.includes(token))?.[0] || '';
    }

    function deriveCuisines(r) {
      const fromTags = String(r.tags || '').split(';').map(normalizeCuisine).filter(Boolean);
      const fallback = categoryCuisine(r.category);
      return Array.from(new Set(fromTags.length ? fromTags : [fallback].filter(Boolean))).sort((a, b) => a.localeCompare(b));
    }

    restaurants.forEach(r => { r.cuisines = deriveCuisines(r); });

    function searchHaystack(r) {
      return [r.name, r.outlet, r.area, r.tags, r.category, r.address, ...(r.cuisines || [])].join(' ').toLowerCase();
    }

    function populateCuisineFilter() {
      const counts = new Map();
      restaurants.forEach(r => {
        (r.cuisines || []).forEach(cuisine => counts.set(cuisine, (counts.get(cuisine) || 0) + 1));
      });
      const options = Array.from(counts.entries()).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
      options.forEach(([cuisine, count]) => {
        const option = document.createElement('option');
        option.value = cuisine;
        option.textContent = `${cuisine} (${count})`;
        els.cuisineFilter.append(option);
      });
    }

    function getFiltered() {
      const query = state.query.trim().toLowerCase();
      return restaurants
        .filter(r => state.area === 'all' || r.area === state.area)
        .filter(r => state.cuisine === 'all' || (r.cuisines || []).includes(state.cuisine))
        .filter(r => !query || searchHaystack(r).includes(query))
        .sort((a, b) => {
          if (state.sortBy === 'rating') return (b.rating || 0) - (a.rating || 0) || (b.reviews || 0) - (a.reviews || 0) || a.name.localeCompare(b.name);
          if (state.sortBy === 'reviews') return (b.reviews || 0) - (a.reviews || 0) || (b.rating || 0) - (a.rating || 0) || a.name.localeCompare(b.name);
          if (state.sortBy === 'name') return a.name.localeCompare(b.name);
          return (areaOrder.get(a.area) ?? 999) - (areaOrder.get(b.area) ?? 999) || (b.rating || 0) - (a.rating || 0) || a.name.localeCompare(b.name);
        });
    }

    function getVisibleAreas(list) {
      const names = new Set(list.map(r => r.area));
      return areas.filter(area => names.has(area.name));
    }

    function renderAreaControls(list) {
      const visibleAreas = getVisibleAreas(list);
      const totalVisible = list.length;
      const allActive = state.area === 'all';
      els.areaList.innerHTML = '';
      els.areaStrip.innerHTML = '';
      const fullButtons = [{ name: 'All areas', key: 'all', count: totalVisible, distanceFromReemKm: null, averageRating: stats.avgRating }]
        .concat(visibleAreas.map(area => ({ ...area, key: area.name })));

      for (const area of fullButtons) {
        const active = area.key === state.area || (area.key === 'all' && allActive);
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'area-btn' + (active ? ' active' : '');
        button.dataset.area = area.key;
        button.innerHTML = `
          <span class="area-name">${escapeHtml(area.name)}</span>
          <span class="area-count">${area.count}</span>
          <span class="area-meta"><span>${area.key === 'all' ? `${areas.length} areas` : formatDistance(area.distanceFromReemKm)}</span><span>&#9733; ${Number(area.averageRating || 0).toFixed(2)}</span></span>
        `;
        button.addEventListener('click', () => setArea(area.key));
        els.areaList.append(button);
      }

      const stripButtons = fullButtons.map(area => {
        const active = area.key === state.area || (area.key === 'all' && allActive);
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'area-chip' + (active ? ' active' : '');
        button.dataset.area = area.key;
        button.innerHTML = `<span>${escapeHtml(area.name)}</span><span class="distance-dot">${area.key === 'all' ? area.count : visibleDistance(area.distanceFromReemKm)}</span>`;
        button.addEventListener('click', () => setArea(area.key));
        return button;
      });
      stripButtons.forEach(button => els.areaStrip.append(button));
    }

    function sectionTemplate(area, group) {
      const avg = group.reduce((sum, r) => sum + (r.rating || 0), 0) / Math.max(group.length, 1);
      const totalReviews = group.reduce((sum, r) => sum + (r.reviews || 0), 0);
      return `
        <div class="section-head">
          <div class="section-title">
            <h2>${escapeHtml(area.name)}</h2>
            <div class="section-distance"><span class="pin-mark" aria-hidden="true"></span><span>${formatDistance(area.distanceFromReemKm)}</span></div>
          </div>
          <div class="section-metrics">
            <span class="metric">${group.length} place${group.length === 1 ? '' : 's'}</span>
            <span class="metric"><span class="star">&#9733;</span>${avg.toFixed(2)} avg</span>
            <span class="metric">${formatReviews(totalReviews)} reviews</span>
          </div>
        </div>
        <div class="restaurant-grid">
          ${group.map(cardTemplate).join('')}
        </div>
      `;
    }

    function cardTemplate(r) {
      const outlet = r.outlet || r.area || 'Abu Dhabi';
      const address = r.address || outlet;
      const badge = r.tags || r.category || 'Restaurant';
      const cuisineBadge = (r.cuisines || []).slice(0, 2).join(' / ');
      const link = r.mapsUrl || r.officialUrl || '#';
      const target = link === '#' ? '' : ' target="_blank" rel="noopener"';
      return `
        <a class="restaurant-card" href="${escapeHtml(link)}"${target}>
          <div class="card-head">
            <h3 class="name">${escapeHtml(r.name)}</h3>
            <span class="score"><span class="star">&#9733;</span>${Number(r.rating || 0).toFixed(1)} <span>(${formatReviews(r.reviews)})</span></span>
          </div>
          <p class="location">${escapeHtml(outlet)}</p>
          <p class="address">${escapeHtml(address)}</p>
          <div class="card-footer">
            <span class="badge distance">${visibleDistance(r.distanceFromReemKm)} from Reem</span>
            ${cuisineBadge ? `<span class="badge">${escapeHtml(cuisineBadge)}</span>` : ''}
            <span class="badge">${escapeHtml(badge)}</span>
          </div>
        </a>
      `;
    }

    function renderSections(list) {
      els.sections.innerHTML = '';
      const groups = new Map();
      for (const item of list) {
        if (!groups.has(item.area)) groups.set(item.area, []);
        groups.get(item.area).push(item);
      }
      const orderedAreas = areas.filter(area => groups.has(area.name));
      for (const area of orderedAreas) {
        const section = document.createElement('section');
        section.className = 'area-section';
        section.id = `area-${area.slug}`;
        section.innerHTML = sectionTemplate(area, groups.get(area.name));
        els.sections.append(section);
      }
      els.empty.style.display = list.length ? 'none' : 'block';
      els.resultCount.textContent = `${list.length} place${list.length === 1 ? '' : 's'}`;
    }

    function setArea(area) {
      state.area = area;
      render();
      const target = area === 'all' ? document.querySelector('.content') : document.getElementById(`area-${areaByName.get(area)?.slug}`);
      target?.scrollIntoView({ block: 'start', behavior: 'smooth' });
    }

    function render() {
      const list = getFiltered();
      renderAreaControls(list);
      renderSections(list);
    }

    els.search.addEventListener('input', event => { state.query = event.target.value; render(); });
    els.clearSearch.addEventListener('click', () => { state.query = ''; state.area = 'all'; state.cuisine = 'all'; els.search.value = ''; els.cuisineFilter.value = 'all'; render(); els.search.focus(); });
    els.cuisineFilter.addEventListener('change', event => { state.cuisine = event.target.value; render(); });
    els.sortBy.addEventListener('change', event => { state.sortBy = event.target.value; render(); });
    populateCuisineFilter();
    render();
  </script>
</body>
</html>
